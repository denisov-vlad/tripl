# Main nginx config — replaces the upstream image's /etc/nginx/nginx.conf.
# We do this so we can `load_module` ngx_brotli at the top level (modules
# can't be loaded from conf.d, since those are included inside http{}).

load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Brotli — serve precompressed .br files where present (built by
    # vite-plugin-compression2). brotli on/comp_level handle dynamic
    # content (proxied API responses, etc.); we keep it light at level 4.
    brotli_static on;
    brotli on;
    brotli_comp_level 4;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/wasm
        font/ttf
        font/otf
        font/woff
        font/woff2
        image/svg+xml;

    server {
        listen 5173;
        resolver 127.0.0.11 valid=5s;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            set $backend http://api:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
